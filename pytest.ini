[pytest]
DJANGO_SETTINGS_MODULE = locallibrary.settings
python_files = test_*.py *_tests.py
testpaths =
    tests
    catalog/tests
addopts = -ra
markers =
    unit: Unit tests for models, forms, and services.
    integration_client: Django test-client integration tests.
    integration_api: Requests-based API integration tests.
    system: Selenium end-to-end system tests.
filterwarnings =
    ignore:'asyncio\.iscoroutinefunction' is deprecated and slated for removal in Python 3\.16; use inspect\.iscoroutinefunction\(\) instead:DeprecationWarning:django\.contrib\.auth\.decorators
